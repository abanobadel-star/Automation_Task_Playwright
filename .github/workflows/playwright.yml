name: Playwright Tests

on:
  schedule:
    - cron: '0 7 * * *'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests on'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - preprod
          - prod
      tag:
        description: 'Test tag to run'
        required: true
        default: '@regression'
        type: choice
        options:
          - '@regression'
          - '@sanity'
          - '@smoke'

  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t automation-task .

    - name: Run Playwright tests
      run: |
        export ENV=${{ github.event.inputs.environment || 'staging' }}
        export TAG=${{ github.event.inputs.tag || '@regression' }}
        docker-compose up --abort-on-container-exit --remove-orphans
      env:
        ENV: ${{ github.event.inputs.environment || 'staging' }}
        TAG: ${{ github.event.inputs.tag || '@regression' }}

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30