name: Playwright Tests

on:
  schedule:
    - cron: '0 7 1 * *'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests on'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - preprod
          - prod
      tag:
        description: 'Test tag to run'
        required: true
        default: '@regression'
        type: choice
        options:
          - '@regression'
          - '@sanity'
          - '@smoke'

  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test --grep "${{ github.event.inputs.tag || '@regression' }}"
      env:
        ENV: ${{ github.event.inputs.environment || 'staging' }}  
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
