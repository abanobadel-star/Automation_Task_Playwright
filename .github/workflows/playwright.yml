name: Playwright Tests

on:
  schedule:
    - cron: '0 7 * * *'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests on'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - preprod
          - prod
      tag:
        description: 'Test tag to run'
        required: true
        default: '@regression'
        type: choice
        options:
          - '@regression'
          - '@sanity'
          - '@smoke'

  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Optional but recommended for stability
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Playwright tests with Docker Compose
        run: |
          export ENV=${{ github.event.inputs.environment || 'staging' }}
          export TAG=${{ github.event.inputs.tag || '@regression' }}
          docker compose up --abort-on-container-exit --remove-orphans

      - name: Shutdown containers
        if: always()
        run: docker compose down

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30